name: fork release

# Build binaries from this fork (u2i/lightpanda-browser) and attach
# them to a GitHub Release. Triggered by:
#   * pushing a tag matching `fork-*` (e.g. `fork-2026-05-10`)
#   * manual workflow_dispatch from the Actions tab
#
# Output: a GitHub Release with three binaries:
#   * lightpanda-x86_64-linux
#   * lightpanda-aarch64-linux
#   * lightpanda-aarch64-macos
#
# wallabidi (and any other consumer) can then point LIGHTPANDA_PATH at
# a downloaded binary, e.g.:
#   curl -fsSL -o lightpanda \
#     https://github.com/u2i/lightpanda-browser/releases/download/fork-latest/lightpanda-aarch64-macos
#   chmod +x lightpanda

on:
  push:
    tags:
      - 'fork-*'
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'fork-latest' }}

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            cpu_flag: -Dcpu=x86_64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            cpu_flag: -Dcpu=generic

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    env:
      ARCH: ${{ matrix.arch }}
      OS: linux

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install
        with:
          os: ${{ env.OS }}
          arch: ${{ env.ARCH }}

      - name: v8 snapshot
        run: zig build -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast snapshot_creator -- src/snapshot.bin

      - name: zig build
        run: zig build -Dsnapshot_path=../../snapshot.bin -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast ${{ matrix.cpu_flag }}

      - name: Rename binary
        run: mv zig-out/bin/lightpanda lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          tag: ${{ env.RELEASE_TAG }}
          makeLatest: true
          body: |
            Fork build of lightpanda-io/browser with the cookie-on-WS-upgrade patch.
            Built from branch `cookie-on-ws-upgrade`.

  build-macos:
    runs-on: macos-14
    timeout-minutes: 30

    env:
      ARCH: aarch64
      OS: macos

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install
        with:
          os: ${{ env.OS }}
          arch: ${{ env.ARCH }}

      - name: v8 snapshot
        run: zig build -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast snapshot_creator -- src/snapshot.bin

      - name: zig build
        run: zig build -Dsnapshot_path=../../snapshot.bin -Dprebuilt_v8_path=v8/libc_v8.a -Doptimize=ReleaseFast

      - name: Rename binary
        run: mv zig-out/bin/lightpanda lightpanda-${{ env.ARCH }}-${{ env.OS }}

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: lightpanda-${{ env.ARCH }}-${{ env.OS }}
          tag: ${{ env.RELEASE_TAG }}
          makeLatest: true
          body: |
            Fork build of lightpanda-io/browser with the cookie-on-WS-upgrade patch.
            Built from branch `cookie-on-ws-upgrade`.
